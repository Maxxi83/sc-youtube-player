<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VersusTube Player</title>

  <style>
    html, body, #player {
      width: 100vw;
      height: 100vh;
      margin: 0;
      overflow: hidden;
      background: #000;
    }

    #volumeDebug {
      position: fixed;
      right: 8px;
      bottom: 8px;
      z-index: 9999;
      color: #fff;
      background: rgba(0,0,0,.55);
      font: 12px Arial, sans-serif;
      padding: 4px 6px;
      border-radius: 4px;
    }
  </style>
</head>

<body>

<div id="player"></div>
<div id="volumeDebug">VOL: --</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
const params = new URLSearchParams(window.location.search);

const sourceUrl = params.get('url') || '';
const initialVolume = Math.max(
  0,
  Math.min(100, Number(params.get('volume')) || 60)
);

function getVideoId(url) {
  try {
    const parsed = new URL(url);

    if (parsed.hostname.includes('youtu.be')) {
      return parsed.pathname.replace('/', '').split('/')[0];
    }

    if (parsed.searchParams.has('v')) {
      return parsed.searchParams.get('v');
    }

    if (parsed.pathname.includes('/shorts/')) {
      return parsed.pathname.split('/shorts/')[1].split('/')[0];
    }

    if (parsed.pathname.includes('/embed/')) {
      return parsed.pathname.split('/embed/')[1].split('/')[0];
    }
  } catch (error) {}

  return '';
}

const videoId = getVideoId(sourceUrl);

console.log('[SC_PROXY] url:', sourceUrl);
console.log('[SC_PROXY] videoId:', videoId);
console.log('[SC_PROXY] initialVolume:', initialVolume);

window.player = null;
window.currentVolume = initialVolume;

function setDebugVolume(volume) {
  const debug = document.getElementById('volumeDebug');

  if (debug) {
    debug.textContent = 'VOL: ' + volume;
  }
}

function applyVolume(volume) {
  volume = Math.max(
    0,
    Math.min(100, Number(volume) || 0)
  );

  window.currentVolume = volume;

  setDebugVolume(volume);

  if (
    !window.player ||
    typeof window.player.setVolume !== 'function'
  ) {
    console.log('[SC_PROXY] player not ready');
    return;
  }

  try {
    window.player.setVolume(volume);

    if (volume <= 0) {
      window.player.mute();
    } else {
      window.player.unMute();
    }

    console.log('[SC_PROXY] applied volume:', volume);
  } catch (error) {
    console.error('[SC_PROXY] volume error:', error);
  }
}

window.addEventListener('message', function (event) {
  let data = event.data;

  if (typeof data === 'string') {
    try {
      data = JSON.parse(data);
    } catch {
      return;
    }
  }

  if (!data || data.action !== 'setVolume') return;

  console.log('[SC_PROXY] received volume:', data.volume);

  applyVolume(data.volume);
});

window.onYouTubeIframeAPIReady = function () {
  if (!videoId) {
    console.error('[SC_PROXY] invalid video id');
    return;
  }

  window.player = new YT.Player('player', {
    width: '100%',
    height: '100%',
    videoId: videoId,
    host: 'https://www.youtube.com',

    playerVars: {
      autoplay: 1,
      mute: 1,
      controls: 1,
      rel: 0,
      playsinline: 1,
      enablejsapi: 1,
      modestbranding: 1,
      origin: window.location.origin
    },

    events: {
      onReady: function (event) {
        window.player = event.target;

        console.log('[SC_PROXY] player ready');

        setDebugVolume(initialVolume);

        // Começa mutado
        event.target.mute();
        event.target.playVideo();

        // Espera player estabilizar
        setTimeout(() => {
          try {
            if (initialVolume > 0) {
              event.target.unMute();
            }

            event.target.setVolume(initialVolume);

            console.log(
              '[SC_PROXY] startup volume:',
              initialVolume
            );

          } catch (error) {
            console.error(
              '[SC_PROXY] startup volume error:',
              error
            );
          }
        }, 2000);
      },

      onError: function (event) {
        console.log(
          '[SC_PROXY] youtube error code:',
          event && event.data
        );
      }
    }
  });
};
</script>

</body>
</html>
