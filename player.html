<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SC YouTube Proxy Player</title>

  <style>
    html, body, #player {
      width: 100vw;
      height: 100vh;
      margin: 0;
      overflow: hidden;
      background: #000;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }

    #volumeDebug {
      position: fixed;
      right: 8px;
      bottom: 8px;
      z-index: 9999;
      color: #fff;
      background: rgba(0, 0, 0, 0.55);
      font: 12px Arial, sans-serif;
      padding: 4px 6px;
    }
  </style>
</head>

<body>
  <div id="player"></div>
  <div id="volumeDebug">VOL: --</div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const sourceUrl = params.get('url') || '';
    const initialVolume = params.get('volume') || '60';

    function getVideoId(url) {
      try {
        const parsed = new URL(url);

        if (parsed.hostname.includes('youtu.be')) {
          return parsed.pathname.replace('/', '').split('/')[0];
        }

        if (parsed.searchParams.has('v')) {
          return parsed.searchParams.get('v');
        }

        if (parsed.pathname.includes('/shorts/')) {
          return parsed.pathname.split('/shorts/')[1].split('/')[0];
        }

        if (parsed.pathname.includes('/embed/')) {
          return parsed.pathname.split('/embed/')[1].split('/')[0];
        }
      } catch (error) {}

      return '';
    }

    function setDebugVolume(volume) {
      const debug = document.getElementById('volumeDebug');
      if (debug) {
        debug.textContent = 'VOL: ' + volume;
      }
    }

    const videoId = getVideoId(sourceUrl);

    console.log('[SC_PROXY] sourceUrl:', sourceUrl);
    console.log('[SC_PROXY] videoId:', videoId);
    console.log('[SC_PROXY] initialVolume:', initialVolume);

    setDebugVolume(initialVolume);

    if (videoId) {
      const iframe = document.createElement('iframe');

      iframe.allow =
        'autoplay; encrypted-media; fullscreen; picture-in-picture';

      iframe.referrerPolicy = 'strict-origin-when-cross-origin';

      iframe.src =
        'https://www.youtube.com/embed/' + encodeURIComponent(videoId) +
        '?autoplay=1' +
        '&mute=0' +
        '&controls=1' +
        '&rel=0' +
        '&playsinline=1';

      document.getElementById('player').appendChild(iframe);
    } else {
      document.getElementById('player').innerHTML =
        '<div style="color:white;font:24px Arial;padding:40px;">URL inválida</div>';
    }

    window.addEventListener('message', function(event) {
      let data = event.data;

      if (typeof data === 'string') {
        try {
          data = JSON.parse(data);
        } catch (error) {
          return;
        }
      }

      if (!data || data.action !== 'setVolume') return;

      const volume = Math.max(0, Math.min(100, Number(data.volume) || 0));

      console.log('[SC_PROXY] received volume:', volume);

      // Nesta versão simples o iframe puro não controla volume real.
      // Mantém apenas o debug visual para confirmar proximidade.
      setDebugVolume(volume);
    });
  </script>
</body>
</html>
